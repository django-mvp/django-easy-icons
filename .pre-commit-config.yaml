# Family-standard pre-commit configuration (from django-mvp/shared
# templates/pre-commit-config.yaml @ v0.2.0). The Python tools run as local
# hooks inside the Poetry env, versioned by the mvp-shared[dev] bundle.
# ruff format replaces black; ruff's UP rules replace pyupgrade.

exclude: "^docs/|/migrations/"
default_stages: [pre-commit]

repos:

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: https://github.com/python-poetry/poetry
    rev: '2.3.4'
    hooks:
      - id: poetry-check
      - id: poetry-lock
        stages: [manual]  # Only run manually, not in CI

  # Local hooks that use the Poetry environment
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: poetry run ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: poetry run ruff format
        language: system
        types: [python]
        require_serial: true
      - id: mypy
        name: mypy
        entry: poetry run mypy
        language: system
        # Without require_serial, pre-commit splits the file list into parallel
        # batches, and concurrent mypy processes race on the shared .mypy_cache —
        # INTERNAL ERROR on a cold cache. One serial invocation is also what
        # mirrors-mypy ships.
        require_serial: true
        types: [python]
        files: ^easy_icons/
      - id: deptry
        name: deptry
        entry: poetry run deptry .
        language: system
        pass_filenames: false
        always_run: true

# pre-commit.ci runs only the env-independent hooks; the local Poetry-env hooks
# run in CI via the shared build workflow's Code Quality job.
ci:
  autoupdate_schedule: monthly
  skip: [poetry-lock, ruff, ruff-format, mypy, deptry]
  submodules: false
