name: Build

on:
  push:
    branches:
      - main
    paths:
      - 'easy_icons/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.pre-commit-config.yaml'
      - '.github/workflows/build.yml'
  # No paths filter on pull_request: these checks are ruleset-required, and a
  # path-filtered required check never reports on out-of-scope PRs, blocking merge.
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  call-build:
    uses: django-mvp/shared/.github/workflows/build.yml@main
    with:
      source-dir: easy_icons
    secrets: inherit
